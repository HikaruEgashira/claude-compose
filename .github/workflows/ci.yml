name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
env:
  CARGO_TERM_COLOR: always
jobs:
  check:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v4
        timeout-minutes: 5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        timeout-minutes: 5
        with:
          components: clippy, rustfmt
      - timeout-minutes: 5
        run: cargo fmt --check
      - timeout-minutes: 10
        run: cargo clippy -- -D warnings
      - timeout-minutes: 15
        run: cargo test
      - timeout-minutes: 15
        run: cargo build --release
