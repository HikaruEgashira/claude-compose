name: Publish to crates.io
on:
  push:
    tags:
      - "v*"
permissions:
  contents: write
  id-token: write
  attestations: write
jobs:
  publish:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        timeout-minutes: 5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        timeout-minutes: 5
      - timeout-minutes: 10
        run: cargo clippy -- -D warnings
      - timeout-minutes: 15
        run: cargo test
      - timeout-minutes: 10
        run: cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
  build:
    timeout-minutes: 60
    runs-on: ${{ matrix.os }}
    needs: publish
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: claude-compose-x86_64-linux
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: claude-compose-aarch64-linux
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: claude-compose-x86_64-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: claude-compose-aarch64-darwin
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        timeout-minutes: 5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        timeout-minutes: 5
        with:
          targets: ${{ matrix.target }}
      - name: Install cross
        if: matrix.cross
        timeout-minutes: 10
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Build (cross)
        if: matrix.cross
        timeout-minutes: 30
        run: cross build --release --target ${{ matrix.target }}
      - name: Build (native)
        if: ${{ !matrix.cross }}
        timeout-minutes: 30
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        timeout-minutes: 5
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/claude-compose dist/${{ matrix.artifact }}
      - name: Attest
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        timeout-minutes: 5
        with:
          subject-path: dist/${{ matrix.artifact }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        timeout-minutes: 5
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
  release:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        timeout-minutes: 5
        with:
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        timeout-minutes: 5
        with:
          path: ${{ runner.temp }}/artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        timeout-minutes: 5
        with:
          generate_release_notes: true
          files: ${{ runner.temp }}/artifacts/*
