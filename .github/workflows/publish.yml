name: Publish to crates.io
on:
  push:
    tags:
      - "v*"
permissions:
  contents: write
  id-token: write
  attestations: write
jobs:
  publish:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        timeout-minutes: 5
      - timeout-minutes: 10
        run: cargo clippy -- -D warnings
      - timeout-minutes: 15
        run: cargo test
      - timeout-minutes: 10
        run: cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
  build:
    timeout-minutes: 60
    runs-on: ${{ matrix.os }}
    needs: publish
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: claude-compose-x86_64-linux
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: claude-compose-aarch64-linux
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: claude-compose-x86_64-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: claude-compose-aarch64-darwin
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        timeout-minutes: 5
        with:
          targets: ${{ matrix.target }}
      - name: Install cross
        if: matrix.cross
        timeout-minutes: 10
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Build (cross)
        if: matrix.cross
        timeout-minutes: 30
        run: cross build --release --target ${{ matrix.target }}
      - name: Build (native)
        if: ${{ !matrix.cross }}
        timeout-minutes: 30
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        timeout-minutes: 5
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/claude-compose dist/${{ matrix.artifact }}
      - name: Attest
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        timeout-minutes: 5
        with:
          subject-path: dist/${{ matrix.artifact }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        timeout-minutes: 5
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
  release:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 5
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        timeout-minutes: 5
        with:
          path: ${{ runner.temp }}/artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        timeout-minutes: 5
        with:
          generate_release_notes: true
          files: ${{ runner.temp }}/artifacts/*
